name: Build and Deploy Static Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Inject Database Config
        run: |
          mkdir -p out/api
          echo "<?php \$db_host='${{ secrets.DB_HOST }}'; \$db_user='${{ secrets.DB_USER }}'; \$db_pass='${{ secrets.DB_PASS }}'; \$db_name='${{ secrets.DB_NAME }}'; ?>" > out/api/config.php

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: production
          force_orphan: true
