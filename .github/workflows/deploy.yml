name: Build and Deploy Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Inject Database and Deploy Config
        run: |
          mkdir -p out/api
          echo "<?php \$db_host='${{ secrets.DB_HOST }}'; \$db_user='${{ secrets.DB_USER }}'; \$db_pass='${{ secrets.DB_PASS }}'; \$db_name='${{ secrets.DB_NAME }}'; \$gh_pat='${{ secrets.GH_PAT }}'; \$gh_repo='octobercitystudio-cyber/wlaaalashmawy-site'; ?>" > out/api/config.php

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: production

      - name: FTP Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        if: ${{ env.FTP_SERVER != '' }}
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          danger-file-transfer-protocol: ftp
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            images/uploads/**
